# Aegis PowerDNS config — replaces the image's default (which launches gsqlite3).
# Secrets and .env-driven values are passed as CLI args in docker-compose.yml.
local-address=0.0.0.0,::
launch=gpgsql
gpgsql-host=postgres
gpgsql-port=5432
# Enable DNSSEC operations on the gpgsql backend (Phase 2). The DNSSEC schema
# tables (cryptokeys/domainmetadata/tsigkeys) ship in pdns-gpgsql-schema.sql.
gpgsql-dnssec=yes
# Auto-rectify zones on API edits so NSEC/ordername stay correct after signing.
default-api-rectify=yes
api=yes
webserver=yes
webserver-address=0.0.0.0
webserver-port=8081
webserver-allow-from=0.0.0.0/0
default-ttl=300
