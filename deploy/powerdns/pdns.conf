# Aegis PowerDNS config — replaces the image's default (which launches gsqlite3).
# Secrets and .env-driven values are passed as CLI args in docker-compose.yml.
local-address=0.0.0.0,::
# gpgsql serves the customer zones; geoip provides country()/continent() to the
# Lua records gpgsql publishes (GeoDNS). The geoip backend is authoritative for
# no zones (see geoip-zones.yml).
launch=gpgsql,geoip
geoip-database-files=/etc/powerdns/geoip/country.mmdb
geoip-zones-file=/etc/powerdns/geoip-zones.yml
gpgsql-host=postgres
gpgsql-port=5432
# Enable DNSSEC operations on the gpgsql backend (Phase 2). The DNSSEC schema
# tables (cryptokeys/domainmetadata/tsigkeys) ship in pdns-gpgsql-schema.sql.
gpgsql-dnssec=yes
# Auto-rectify zones on API edits so NSEC/ordername stay correct after signing.
default-api-rectify=yes
# Lua records power weighted edge distribution (pickwhashed) + health (ifurlup).
enable-lua-records=yes
# Honour EDNS Client Subnet so weighted/geo selection follows the real client.
edns-subnet-processing=yes
api=yes
webserver=yes
webserver-address=0.0.0.0
webserver-port=8081
webserver-allow-from=0.0.0.0/0
default-ttl=300
